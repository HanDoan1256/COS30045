<!DOCTYPE html>
<html>
<head>
    <title>SVG House and Garden</title>
</head>


<body>

<h1>My SVG House</h1>

<svg width="600" height="400">
    <!-- Sky -->
    <rect x="0" y="0" width="600" height="400" fill ="skyblue"/>
    <!-- Grass -->
    <rect x="0" y="200" width="600" height="200" fill ="green"/>
    <!-- House -->
    <rect x="200" y="150" width="200" height="150" fill ="yellow"/>
    <!-- Roof -->
    <polygon points="200,150 300,50 400,150" fill="red"/>
    <!-- Door -->
    <rect x="275" y="200" width="50" height="100" fill ="pink"/>
    <!-- Windows -->
     <g width="40" height="40" fill ="pink">
        <rect x="220" y="170" width="40" height="40"/>
        <rect x="340" y="170" width="40" height="40"/>
    </g>
    <!-- Sun -->
    <circle cx="530" cy="50" r="30" fill="orange" stroke="red" stroke-width="2"/>
    <!-- Trees -->
    <rect x="50" y="150" width="20" height="100" fill="brown"/>
    <circle cx="60" cy="130" r="40" fill="green"/>
    <rect x="500" y="150" width="20" height="100" fill="brown"/>
    <circle cx="510" cy="130" r="40" fill="green"/>
    <!-- Path -->
    <rect x="290" y="300" width="20" height="100" fill="gray"/>

</svg>
<h2>SVG Coordinate Explanation</h2>

<img src="image/svghouse2.jpg" width="600">

</body>
</html>
